<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات المنتخبات - كأس العالم 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e3a8a;
            --accent-gold: #fbbf24;
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --text-secondary: #cbd5e1;
            --win-color: #4ade80;
            --loss-color: #ef4444;
            --draw-color: #fbbf24;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, var(--accent-gold), #f59e0b);
            color: #0f172a;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.6);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            margin: 80px auto 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select {
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
            cursor: pointer;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        select option {
            background: #0f172a;
            color: var(--text-color);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--glass-border);
            border-right: 4px solid var(--primary-color);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-gold);
        }

        .stat-card p {
            margin: 8px 0 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-card.win { border-right-color: var(--win-color); }
        .stat-card.win h3 { color: var(--win-color); }
        .stat-card.loss { border-right-color: var(--loss-color); }
        .stat-card.loss h3 { color: var(--loss-color); }
        .stat-card.draw { border-right-color: var(--draw-color); }
        .stat-card.draw h3 { color: var(--draw-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: linear-gradient(135deg, var(--primary-color), #0f172a);
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1rem;
        }

        tr:hover {
            background: rgba(251, 191, 36, 0.08);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .highlight {
            font-weight: 900;
            color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .result-win { color: var(--win-color); font-weight: 900; font-size: 1.1rem; }
        .result-loss { color: var(--loss-color); font-weight: 900; font-size: 1.1rem; }
        .result-draw { color: var(--draw-color); font-weight: 900; font-size: 1.1rem; }

        .no-results {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 30px;
            padding: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 20px; margin-top: 70px; }
            .back-btn { padding: 10px 18px; font-size: 0.9rem; }
            th, td { padding: 10px 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">
    <i class="fas fa-arrow-right"></i>
    <span>العودة للموقع</span>
</a>

<div class="container">
    <h1><i class="fas fa-chart-line"></i> إحصائيات المنتخبات</h1>
    <p class="subtitle">اختر منتخباً لعرض جميع مبارياته ونتائجه</p>

    <div class="search-box">
        <select id="teamSelect" onchange="displayTeamStats()">
            <option value="">-- اختر اسم المنتخب --</option>
        </select>
    </div>

    <div id="statsArea"></div>
    <div id="resultsArea"></div>
</div>
<script>
    let matchesData = [];
    let dataLoaded = false;

    // قاموس الأسماء العربية
    const arabicNames = {
        'Mexico': 'المكسيك', 'South Africa': 'جنوب أفريقيا',
        'South Korea': 'كوريا الجنوبية', 'Korea Republic': 'كوريا الجنوبية',
        'Czechia': 'التشيك', 'Czech Republic': 'التشيك',
        'Canada': 'كندا', 'Bosnia-Herzegovina': 'البوسنة والهرسك',
        'Bosnia and Herzegovina': 'البوسنة والهرسك', 'Bosnia-H.': 'البوسنة',
        'United States': 'الولايات المتحدة', 'USA': 'الولايات المتحدة',
        'Paraguay': 'باراغواي', 'Qatar': 'قطر',
        'Switzerland': 'سويسرا', 'Brazil': 'البرازيل',
        'Morocco': 'المغرب', 'Haiti': 'هايتي',
        'Scotland': 'اسكتلندا', 'Australia': 'أستراليا',
        'Turkey': 'تركيا', 'Germany': 'ألمانيا',
        'Curaçao': 'كوراساو', 'Netherlands': 'هولندا',
        'Japan': 'اليابان', 'Ivory Coast': 'ساحل العاج',
        'Côte d\'Ivoire': 'ساحل العاج', 'Ecuador': 'الإكوادور',
        'Sweden': 'السويد', 'Tunisia': 'تونس',
        'Spain': 'إسبانيا', 'Cape Verde Islands': 'كاب فيردي',
        'Cape Verde': 'كاب فيردي', 'Belgium': 'بلجيكا',
        'Egypt': 'مصر', 'Saudi Arabia': 'السعودية',
        'Uruguay': 'أوروغواي', 'Iran': 'إيران',
        'New Zealand': 'نيوزيلندا', 'France': 'فرنسا',
        'Senegal': 'السنغال', 'Iraq': 'العراق',
        'Norway': 'النرويج', 'Argentina': 'الأرجنتين',
        'Algeria': 'الجزائر', 'Austria': 'النمسا',
        'Jordan': 'الأردن', 'Portugal': 'البرتغال',
        'Congo DR': 'الكونغو الديمقراطية', 'England': 'إنجلترا',
        'Croatia': 'كرواتيا', 'Ghana': 'غانا',
        'Panama': 'بنما', 'Uzbekistan': 'أوزبكستان',
        'Colombia': 'كولومبيا', 'Italy': 'إيطاليا',
        'Denmark': 'الدنمارك', 'Poland': 'بولندا',
        'Nigeria': 'نيجيريا', 'Cameroon': 'الكاميرون'
    };

    function getArabicName(name) {
        return arabicNames[name] || name;
    }

    function getStageName(stage) {
        const stages = {
            'GROUP_STAGE': 'دور المجموعات',
            'ROUND_OF_32': 'دور الـ 32',
            'ROUND_OF_16': 'دور الـ 16',
            'QUARTER_FINALS': 'ربع النهائي',
            'SEMI_FINALS': 'نصف النهائي',
            'FINAL': 'النهائي',
            'THIRD_PLACE': 'المركز الثالث'
        };
        return stages[stage] || stage;
    }

    // جلب البيانات من matches.json
    async function loadData() {
        try {
            const response = await fetch('matches.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('HTTP ' + response.status);
            
            const data = await response.json();
            matchesData = data.matches || [];
            dataLoaded = true;
            
            console.log('✅ تم تحميل', matchesData.length, 'مباراة');
            console.log('🏆 المرحلة:', data.tournamentStage);
            console.log('⭐ المنتخبات المتبقية:', data.remainingTeamsAr?.join('، '));
            
            // عرض معلومات البطولة
            displayTournamentInfo(data);
            
            // تعبئة القائمة
            populateTeams();
            
        } catch (error) {
            console.error('❌ خطأ:', error);
            document.getElementById('statsArea').innerHTML = `
                <div style="text-align: center; padding: 40px; background: rgba(239, 68, 68, 0.1); border-radius: 15px; border: 2px solid #ef4444;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ef4444; margin-bottom: 15px;"></i>
                    <p style="color: #ef4444; font-size: 1.1rem; font-weight: 700;">فشل تحميل البيانات</p>
                    <p style="color: var(--text-secondary); margin-top: 10px;">${error.message}</p>
                    <button onclick="loadData()" style="margin-top: 20px; background: var(--accent-gold); color: #0f172a; border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: 700;">
                        <i class="fas fa-sync-alt"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }

    // عرض معلومات البطولة
    function displayTournamentInfo(data) {
        const infoDiv = document.createElement('div');
        infoDiv.style.cssText = 'background: linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(251, 191, 36, 0.05)); border: 2px solid #fbbf24; border-radius: 15px; padding: 20px; margin-bottom: 25px; text-align: center;';
        
        infoDiv.innerHTML = `
            <h3 style="color: #fbbf24; margin-bottom: 15px;">🏆 معلومات البطولة</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem;">المرحلة الحالية</div>
                    <div style="color: #fbbf24; font-size: 1.3rem; font-weight: 900;">${data.tournamentStage || 'غير محدد'}</div>
                </div>
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem;">المباريات المنتهية</div>
                    <div style="color: #4ade80; font-size: 1.3rem; font-weight: 900;">${data.finishedMatchesCount || 0}</div>
                </div>
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem;">إجمالي الأهداف</div>
                    <div style="color: #3b82f6; font-size: 1.3rem; font-weight: 900;">${data.totalGoals || 0}</div>
                </div>
                <div>
                    <div style="color: var(--text-secondary); font-size: 0.9rem;">آخر تحديث</div>
                    <div style="color: var(--text-primary); font-size: 1rem; font-weight: 700;">${new Date(data.lastUpdate).toLocaleString('ar-EG', {dateStyle: 'short', timeStyle: 'short'})}</div>
                </div>
            </div>
            ${data.remainingTeamsAr ? `
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(251, 191, 36, 0.3);">
                <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px;">⭐ المنتخبات المتأهلة لنصف النهائي</div>
                <div style="color: #fbbf24; font-size: 1.2rem; font-weight: 900;">
                    ${data.remainingTeamsAr.join(' • ')}
                </div>
            </div>
            ` : ''}
        `;
        
        document.querySelector('.container').insertBefore(infoDiv, document.querySelector('.search-box'));
    }

    function populateTeams() {
        const select = document.getElementById('teamSelect');
        select.innerHTML = '<option value="">-- اختر اسم المنتخب --</option>';
        
        const teams = new Set();
        matchesData.forEach(m => {
            teams.add(m.homeTeam || m.team1);
            teams.add(m.awayTeam || m.team2);
        });
        
        const sortedTeams = Array.from(teams).sort((a, b) => {
            return getArabicName(a).localeCompare(getArabicName(b), 'ar');
        });
        
        sortedTeams.forEach(team => {
            const option = document.createElement('option');
            option.value = team;
            option.textContent = getArabicName(team) + ' (' + team + ')';
            select.appendChild(option);
        });
    }

    function displayTeamStats() {
        const selectedTeam = document.getElementById('teamSelect').value;
        const statsArea = document.getElementById('statsArea');
        const resultsArea = document.getElementById('resultsArea');

        if (!selectedTeam) {
            statsArea.innerHTML = '';
            resultsArea.innerHTML = '';
            return;
        }

        const teamMatches = matchesData.filter(m => {
            const home = m.homeTeam || m.team1;
            const away = m.awayTeam || m.team2;
            return home === selectedTeam || away === selectedTeam;
        });
        
        teamMatches.sort((a, b) => new Date(b.utcDate || b.date) - new Date(a.utcDate || a.date));

        let wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;
        
        teamMatches.forEach(m => {
            const home = m.homeTeam || m.team1;
            const isHome = home === selectedTeam;
            const teamScore = isHome ? m.homeScore : m.awayScore;
            const oppScore = isHome ? m.awayScore : m.homeScore;
            
            goalsFor += teamScore;
            goalsAgainst += oppScore;
            
            if (teamScore > oppScore) wins++;
            else if (teamScore === oppScore) draws++;
            else losses++;
        });

        const points = (wins * 3) + draws;

        statsArea.innerHTML = `
            <div class="stats-container">
                <div class="stat-card"><h3>${teamMatches.length}</h3><p>المباريات</p></div>
                <div class="stat-card win"><h3>${wins}</h3><p>انتصار</p></div>
                <div class="stat-card draw"><h3>${draws}</h3><p>تعادل</p></div>
                <div class="stat-card loss"><h3>${losses}</h3><p>هزيمة</p></div>
                <div class="stat-card"><h3>${points}</h3><p>النقاط</p></div>
                <div class="stat-card"><h3>${goalsFor}-${goalsAgainst}</h3><p>الأهداف</p></div>
            </div>
        `;

        let tableHTML = `
            <h3 class="section-title"><i class="fas fa-list"></i> مباريات ${getArabicName(selectedTeam)}</h3>
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>المرحلة</th>
                        <th>الفريق الأول</th>
                        <th>النتيجة</th>
                        <th>الفريق الثاني</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>
        `;

        teamMatches.forEach(m => {
            const home = m.homeTeam || m.team1;
            const away = m.awayTeam || m.team2;
            const isHome = home === selectedTeam;
            const teamScore = isHome ? m.homeScore : m.awayScore;
            const oppScore = isHome ? m.awayScore : m.homeScore;
            
            let resultClass = '', statusText = '', statusIcon = '';
            if (teamScore > oppScore) { 
                resultClass = 'result-win'; 
                statusText = 'فوز'; 
                statusIcon = '✅';
            } else if (teamScore < oppScore) { 
                resultClass = 'result-loss'; 
                statusText = 'خسارة'; 
                statusIcon = '❌';
            } else { 
                resultClass = 'result-draw'; 
                statusText = 'تعادل'; 
                statusIcon = '🤝';
            }

            const t1Class = isHome ? 'highlight' : '';
            const t2Class = !isHome ? 'highlight' : '';
            const matchDate = (m.utcDate || m.date || '').split('T')[0];
            const stageName = getStageName(m.stage);

            tableHTML += `
                <tr>
                    <td>${matchDate}</td>
                    <td><span style="background: rgba(251, 191, 36, 0.2); color: #fbbf24; padding: 3px 10px; border-radius: 10px; font-size: 0.85rem; font-weight: 700;">${stageName}</span></td>
                    <td class="${t1Class}">${getArabicName(home)}</td>
                    <td class="${resultClass}">${m.homeScore} - ${m.awayScore}</td>
                    <td class="${t2Class}">${getArabicName(away)}</td>
                    <td class="${resultClass}">${statusIcon} ${statusText}</td>
                </tr>
            `;
        });

        tableHTML += `</tbody></table>`;
        resultsArea.innerHTML = tableHTML;
    }

    // بدء التحميل
    window.onload = function() {
        loadData();
    };
</script>
</body>
</html>
