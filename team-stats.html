<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إحصائيات المنتخبات - كأس العالم 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1e3a8a;
            --accent-gold: #fbbf24;
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #f8fafc;
            --text-secondary: #cbd5e1;
            --win-color: #4ade80;
            --loss-color: #ef4444;
            --draw-color: #fbbf24;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            color: var(--text-color);
            min-height: 100vh;
            padding: 20px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, var(--accent-gold), #f59e0b);
            color: #0f172a;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 20px rgba(251, 191, 36, 0.4);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .back-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(251, 191, 36, 0.6);
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            margin: 80px auto 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        select {
            padding: 12px 20px;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            width: 100%;
            max-width: 350px;
            cursor: pointer;
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-color);
            transition: all 0.3s;
        }

        select:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
        }

        select option {
            background: #0f172a;
            color: var(--text-color);
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 20px 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid var(--glass-border);
            border-right: 4px solid var(--primary-color);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            margin: 0;
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent-gold);
        }

        .stat-card p {
            margin: 8px 0 0;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .stat-card.win { border-right-color: var(--win-color); }
        .stat-card.win h3 { color: var(--win-color); }
        .stat-card.loss { border-right-color: var(--loss-color); }
        .stat-card.loss h3 { color: var(--loss-color); }
        .stat-card.draw { border-right-color: var(--draw-color); }
        .stat-card.draw h3 { color: var(--draw-color); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 15px;
            text-align: center;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            background: linear-gradient(135deg, var(--primary-color), #0f172a);
            color: var(--accent-gold);
            font-weight: 800;
            font-size: 1rem;
        }

        tr:hover {
            background: rgba(251, 191, 36, 0.08);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .highlight {
            font-weight: 900;
            color: var(--accent-gold);
            background: rgba(251, 191, 36, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
        }

        .result-win { color: var(--win-color); font-weight: 900; font-size: 1.1rem; }
        .result-loss { color: var(--loss-color); font-weight: 900; font-size: 1.1rem; }
        .result-draw { color: var(--draw-color); font-weight: 900; font-size: 1.1rem; }

        .no-results {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 30px;
            padding: 40px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent-gold);
            margin: 25px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 20px; margin-top: 70px; }
            .back-btn { padding: 10px 18px; font-size: 0.9rem; }
            th, td { padding: 10px 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<a href="index.html" class="back-btn">
    <i class="fas fa-arrow-right"></i>
    <span>العودة للموقع</span>
</a>

<div class="container">
    <h1><i class="fas fa-chart-line"></i> إحصائيات المنتخبات</h1>
    <p class="subtitle">اختر منتخباً لعرض جميع مبارياته ونتائجه</p>

    <div class="search-box">
        <select id="teamSelect" onchange="displayTeamStats()">
            <option value="">-- اختر اسم المنتخب --</option>
        </select>
    </div>

    <div id="statsArea"></div>
    <div id="resultsArea"></div>
</div>

<script>
    const matchesData = [
        { date: '2026-06-23', team1: 'Norway', score1: 3, team2: 'Senegal', score2: 2 },
        { date: '2026-06-23', team1: 'Jordan', score1: 1, team2: 'Algeria', score2: 2 },
        { date: '2026-06-22', team1: 'New Zealand', score1: 1, team2: 'Egypt', score2: 3 },
        { date: '2026-06-22', team1: 'Argentina', score1: 2, team2: 'Austria', score2: 0 },
        { date: '2026-06-22', team1: 'France', score1: 3, team2: 'Iraq', score2: 0 },
        { date: '2026-06-21', team1: 'Ecuador', score1: 0, team2: 'Curaçao', score2: 0 },
        { date: '2026-06-21', team1: 'Tunisia', score1: 0, team2: 'Japan', score2: 4 },
        { date: '2026-06-21', team1: 'Spain', score1: 4, team2: 'Saudi Arabia', score2: 0 },
        { date: '2026-06-21', team1: 'Belgium', score1: 0, team2: 'Iran', score2: 0 },
        { date: '2026-06-21', team1: 'Uruguay', score1: 2, team2: 'Cape Verde Islands', score2: 2 },
        { date: '2026-06-20', team1: 'Brazil', score1: 3, team2: 'Haiti', score2: 0 },
        { date: '2026-06-20', team1: 'Turkey', score1: 0, team2: 'Paraguay', score2: 1 },
        { date: '2026-06-20', team1: 'Netherlands', score1: 5, team2: 'Sweden', score2: 1 },
        { date: '2026-06-20', team1: 'Germany', score1: 2, team2: 'Ivory Coast', score2: 1 },
        { date: '2026-06-19', team1: 'Mexico', score1: 1, team2: 'South Korea', score2: 0 },
        { date: '2026-06-19', team1: 'United States', score1: 2, team2: 'Australia', score2: 0 },
        { date: '2026-06-19', team1: 'Scotland', score1: 0, team2: 'Morocco', score2: 1 },
        { date: '2026-06-18', team1: 'Uzbekistan', score1: 1, team2: 'Colombia', score2: 3 },
        { date: '2026-06-18', team1: 'Czechia', score1: 1, team2: 'South Africa', score2: 1 },
        { date: '2026-06-18', team1: 'Switzerland', score1: 4, team2: 'Bosnia-Herzegovina', score2: 1 },
        { date: '2026-06-18', team1: 'Canada', score1: 6, team2: 'Qatar', score2: 0 },
        { date: '2026-06-17', team1: 'Argentina', score1: 3, team2: 'Algeria', score2: 0 },
        { date: '2026-06-17', team1: 'Austria', score1: 3, team2: 'Jordan', score2: 1 },
        { date: '2026-06-17', team1: 'Portugal', score1: 1, team2: 'Congo DR', score2: 1 },
        { date: '2026-06-17', team1: 'England', score1: 4, team2: 'Croatia', score2: 2 },
        { date: '2026-06-17', team1: 'Ghana', score1: 1, team2: 'Panama', score2: 0 },
        { date: '2026-06-16', team1: 'Iran', score1: 2, team2: 'New Zealand', score2: 2 },
        { date: '2026-06-16', team1: 'France', score1: 3, team2: 'Senegal', score2: 1 },
        { date: '2026-06-16', team1: 'Iraq', score1: 1, team2: 'Norway', score2: 4 },
        { date: '2026-06-15', team1: 'Sweden', score1: 5, team2: 'Tunisia', score2: 1 },
        { date: '2026-06-15', team1: 'Spain', score1: 0, team2: 'Cape Verde Islands', score2: 0 },
        { date: '2026-06-15', team1: 'Belgium', score1: 1, team2: 'Egypt', score2: 1 },
        { date: '2026-06-15', team1: 'Saudi Arabia', score1: 1, team2: 'Uruguay', score2: 1 },
        { date: '2026-06-14', team1: 'Haiti', score1: 0, team2: 'Scotland', score2: 1 },
        { date: '2026-06-14', team1: 'Australia', score1: 2, team2: 'Turkey', score2: 0 },
        { date: '2026-06-14', team1: 'Germany', score1: 7, team2: 'Curaçao', score2: 1 },
        { date: '2026-06-14', team1: 'Netherlands', score1: 2, team2: 'Japan', score2: 2 },
        { date: '2026-06-14', team1: 'Ivory Coast', score1: 1, team2: 'Ecuador', score2: 0 },
        { date: '2026-06-13', team1: 'United States', score1: 4, team2: 'Paraguay', score2: 1 },
        { date: '2026-06-13', team1: 'Qatar', score1: 1, team2: 'Switzerland', score2: 1 },
        { date: '2026-06-13', team1: 'Brazil', score1: 1, team2: 'Morocco', score2: 1 },
        { date: '2026-06-12', team1: 'South Korea', score1: 2, team2: 'Czechia', score2: 1 },
        { date: '2026-06-12', team1: 'Canada', score1: 1, team2: 'Bosnia-Herzegovina', score2: 1 },
        { date: '2026-06-11', team1: 'Mexico', score1: 2, team2: 'South Africa', score2: 0 }
    ];

    const arabicNames = {
        'Mexico': 'المكسيك', 'South Africa': 'جنوب أفريقيا', 'South Korea': 'كوريا الجنوبية',
        'Czechia': 'التشيك', 'Canada': 'كندا', 'Bosnia-Herzegovina': 'البوسنة والهرسك',
        'United States': 'الولايات المتحدة', 'Paraguay': 'باراغواي', 'Qatar': 'قطر',
        'Switzerland': 'سويسرا', 'Brazil': 'البرازيل', 'Morocco': 'المغرب',
        'Haiti': 'هايتي', 'Scotland': 'اسكتلندا', 'Australia': 'أستراليا',
        'Turkey': 'تركيا', 'Germany': 'ألمانيا', 'Curaçao': 'كوراساو',
        'Netherlands': 'هولندا', 'Japan': 'اليابان', 'Ivory Coast': 'ساحل العاج',
        'Ecuador': 'الإكوادور', 'Sweden': 'السويد', 'Tunisia': 'تونس',
        'Spain': 'إسبانيا', 'Cape Verde Islands': 'كاب فيردي', 'Belgium': 'بلجيكا',
        'Egypt': 'مصر', 'Saudi Arabia': 'السعودية', 'Uruguay': 'أوروغواي',
        'Iran': 'إيران', 'New Zealand': 'نيوزيلندا', 'France': 'فرنسا',
        'Senegal': 'السنغال', 'Iraq': 'العراق', 'Norway': 'النرويج',
        'Argentina': 'الأرجنتين', 'Algeria': 'الجزائر', 'Austria': 'النمسا',
        'Jordan': 'الأردن', 'Portugal': 'البرتغال', 'Congo DR': 'الكونغو الديمقراطية',
        'England': 'إنجلترا', 'Croatia': 'كرواتيا', 'Ghana': 'غانا',
        'Panama': 'بنما', 'Uzbekistan': 'أوزبكستان', 'Colombia': 'كولومبيا'
    };

    function getArabicName(name) {
        return arabicNames[name] || name;
    }

    function populateTeams() {
        const select = document.getElementById('teamSelect');
        const teams = new Set();
        matchesData.forEach(m => {
            teams.add(m.team1);
            teams.add(m.team2);
        });
        
        const sortedTeams = Array.from(teams).sort((a, b) => {
            return getArabicName(a).localeCompare(getArabicName(b), 'ar');
        });
        
        sortedTeams.forEach(team => {
            const option = document.createElement('option');
            option.value = team;
            option.textContent = getArabicName(team) + ' (' + team + ')';
            select.appendChild(option);
        });
    }

    function displayTeamStats() {
        const selectedTeam = document.getElementById('teamSelect').value;
        const statsArea = document.getElementById('statsArea');
        const resultsArea = document.getElementById('resultsArea');

        if (!selectedTeam) {
            statsArea.innerHTML = '';
            resultsArea.innerHTML = '';
            return;
        }

        const teamMatches = matchesData.filter(m => m.team1 === selectedTeam || m.team2 === selectedTeam);
        teamMatches.sort((a, b) => new Date(b.date) - new Date(a.date));

        let wins = 0, draws = 0, losses = 0, goalsFor = 0, goalsAgainst = 0;
        
        teamMatches.forEach(m => {
            const isTeam1 = m.team1 === selectedTeam;
            const teamScore = isTeam1 ? m.score1 : m.score2;
            const oppScore = isTeam1 ? m.score2 : m.score1;
            
            goalsFor += teamScore;
            goalsAgainst += oppScore;
            
            if (teamScore > oppScore) wins++;
            else if (teamScore === oppScore) draws++;
            else losses++;
        });

        const points = (wins * 3) + draws;

        statsArea.innerHTML = `
            <div class="stats-container">
                <div class="stat-card"><h3>${teamMatches.length}</h3><p>المباريات</p></div>
                <div class="stat-card win"><h3>${wins}</h3><p>انتصار</p></div>
                <div class="stat-card draw"><h3>${draws}</h3><p>تعادل</p></div>
                <div class="stat-card loss"><h3>${losses}</h3><p>هزيمة</p></div>
                <div class="stat-card"><h3>${points}</h3><p>النقاط</p></div>
                <div class="stat-card"><h3>${goalsFor}-${goalsAgainst}</h3><p>الأهداف</p></div>
            </div>
        `;

        let tableHTML = `
            <h3 class="section-title"><i class="fas fa-list"></i> مباريات ${getArabicName(selectedTeam)}</h3>
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>الفريق الأول</th>
                        <th>النتيجة</th>
                        <th>الفريق الثاني</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>
        `;

        teamMatches.forEach(m => {
            const isTeam1 = m.team1 === selectedTeam;
            const teamScore = isTeam1 ? m.score1 : m.score2;
            const oppScore = isTeam1 ? m.score2 : m.score1;
            
            let resultClass = '', statusText = '', statusIcon = '';
            if (teamScore > oppScore) { 
                resultClass = 'result-win'; 
                statusText = 'فوز'; 
                statusIcon = '✅';
            } else if (teamScore < oppScore) { 
                resultClass = 'result-loss'; 
                statusText = 'خسارة'; 
                statusIcon = '❌';
            } else { 
                resultClass = 'result-draw'; 
                statusText = 'تعادل'; 
                statusIcon = '🤝';
            }

            const t1Class = isTeam1 ? 'highlight' : '';
            const t2Class = !isTeam1 ? 'highlight' : '';

            tableHTML += `
                <tr>
                    <td>${m.date}</td>
                    <td class="${t1Class}">${getArabicName(m.team1)}</td>
                    <td class="${resultClass}">${m.score1} - ${m.score2}</td>
                    <td class="${t2Class}">${getArabicName(m.team2)}</td>
                    <td class="${resultClass}">${statusIcon} ${statusText}</td>
                </tr>
            `;
        });

        tableHTML += `</tbody></table>`;
        resultsArea.innerHTML = tableHTML;
    }

    window.onload = function() {
        populateTeams();
    };
</script>

</body>
</html>
