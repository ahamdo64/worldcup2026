<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 إحصائيات الموقع</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0f172a 100%);
            color: white; 
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 40px; color: #fbbf24; text-align: center; }
        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            margin: 20px auto;
            max-width: 500px;
            width: 100%;
            border: 2px solid #fbbf24;
            text-align: center;
        }
        .stat-label { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 15px; }
        .stat-number {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fbbf24;
            margin: 10px 0;
        }
        .stat-number.error { font-size: 1.2rem; color: #ef4444; }
        .back-link {
            margin-top: 30px;
            color: #fbbf24;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px 30px;
            border: 2px solid #fbbf24;
            border-radius: 30px;
            display: inline-block;
        }
        .back-link:hover { background: #fbbf24; color: #0f172a; }
        .info-box {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid #fbbf24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
    <h1>📊 إحصائيات الموقع</h1>
    
    <div class="stat-box">
        <div class="stat-label">إجمالي الزيارات</div>
        <div class="stat-number" id="total-visits">جاري التحميل...</div>
        <div id="visit-info" style="color: #94a3b8; font-size: 0.9rem; margin-top: 10px;"></div>
    </div>

    <div class="stat-box">
        <div class="stat-label">عدد زيارات هذه الصفحة</div>
        <div class="stat-number" id="page-visits">-</div>
    </div>
    
    <a href="index.html" class="back-link">← العودة للموقع</a>

    <div class="info-box">
        💡 <strong>ملاحظة:</strong> يتم حساب الزيارات محلياً في متصفحك.<br>
        لإحصائيات دقيقة، يمكنك استخدام Google Analytics.
    </div>

    <script>
        // ============================================
        // نظام الإحصائيات المحلي (LocalStorage)
        // ============================================
        
        function getVisitsFromStorage() {
            // جلب العدد الإجمالي من localStorage
            let totalVisits = localStorage.getItem('totalSiteVisits') || 0;
            let pageVisits = localStorage.getItem('statsPageVisits') || 0;
            let firstVisit = localStorage.getItem('firstVisitDate') || new Date().toLocaleString('ar-EG');
            
            // زيادة العداد
            totalVisits = parseInt(totalVisits) + 1;
            pageVisits = parseInt(pageVisits) + 1;
            
            // حفظ القيم المحدثة
            localStorage.setItem('totalSiteVisits', totalVisits);
            localStorage.setItem('statsPageVisits', pageVisits);
            localStorage.setItem('firstVisitDate', firstVisit);
            localStorage.setItem('lastVisit', new Date().toLocaleString('ar-EG'));
            
            return {
                total: totalVisits,
                page: pageVisits,
                first: firstVisit,
                last: localStorage.getItem('lastVisit')
            };
        }

        // محاولة جلب من countapi.xyz أولاً
        async function fetchFromAPI() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000); // مهلة 5 ثواني
                
                const response = await fetch(
                    'https://api.countapi.xyz/get/ahmed-omran-wwc2026-guide/visits',
                    { 
                        signal: controller.signal,
                        headers: { 'Accept': 'application/json' }
                    }
                );
                
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error('API غير متاح');
                
                const data = await response.json();
                return { success: true, count: data.value };
                
            } catch (error) {
                console.log('❌ فشل جلب البيانات من API، استخدام localStorage');
                return { success: false, error: error.message };
            }
        }

        // الدالة الرئيسية
        async function loadStats() {
            const visitsEl = document.getElementById('total-visits');
            const pageVisitsEl = document.getElementById('page-visits');
            const visitInfoEl = document.getElementById('visit-info');
            
            // محاولة API أولاً
            const apiResult = await fetchFromAPI();
            
            if (apiResult.success) {
                // نجح API
                visitsEl.innerText = apiResult.count.toLocaleString('ar-EG');
                visitInfoEl.innerText = '📊 بيانات من خادم خارجي';
            } else {
                // فشل API، استخدام localStorage
                const stats = getVisitsFromStorage();
                visitsEl.innerText = stats.total.toLocaleString('ar-EG');
                visitInfoEl.innerText = `💻 بيانات محلية (من ${stats.first})`;
            }
            
            // عدد زيارات صفحة الإحصائيات
            const stats = getVisitsFromStorage();
            pageVisitsEl.innerText = stats.page.toLocaleString('ar-EG');
        }

        // تحميل عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', loadStats);
    </script>
</body>
</html>
