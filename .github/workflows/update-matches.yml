name: Update Football Matches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Fetch and Process Matches
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          cat > fetch-matches.js << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.API_KEY;
          const today = new Date().toISOString().split('T')[0];
          const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];

          console.log(`🔍 Fetching matches from ${today} to ${tomorrow}`);

          const options = {
            hostname: 'api.football-data.org',
            path: `/v4/matches?dateFrom=${today}&dateTo=${tomorrow}`,
            headers: {
              'X-Auth-Token': API_KEY
            }
          };

          const req = https.get(options, (res) => {
            let data = '';
            
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error(`❌ API Error: ${res.statusCode}`);
                process.exit(1);
              }

              const response = JSON.parse(data);
              console.log(`✅ Received ${response.matches.length} matches`);

              // قاموس الأعلام
              const flags = {
                'Brazil': '🇧🇷', 'Argentina': '🇦', 'Germany': '🇩🇪',
                'France': '🇷', 'Spain': '🇪🇸', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
                'Italy': '🇮', 'Portugal': '🇵', 'Netherlands': '🇳',
                'Belgium': '🇧🇪', 'Mexico': '🇲🇽', 'USA': '🇺🇸',
                'Canada': '🇦', 'Japan': '🇯🇵', 'South Korea': '🇰🇷',
                'Saudi Arabia': '🇸🇦', 'Egypt': '🇬', 'Morocco': '🇦',
                'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Qatar': '🇶🇦',
                'Iraq': '🇮', 'Jordan': '🇯🇴', 'Australia': '🇦🇺',
                'Uruguay': '🇺🇾', 'Colombia': '🇨🇴', 'Croatia': '🇭',
                'Ghana': '🇬🇭', 'Senegal': '🇳', 'South Africa': '🇦',
                'Sweden': '🇸🇪', 'Switzerland': '🇨🇭', 'Austria': '🇦🇹',
                'Denmark': '🇩🇰', 'Norway': '🇳🇴', 'Turkey': '🇹🇷',
                'Iran': '🇮🇷', 'Paraguay': '🇵🇾', 'Ecuador': '🇪🇨',
                'Poland': '🇵🇱', 'Czech Republic': '🇿', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
                'Bosnia-H.': '🇧🇦', 'Curaçao': '🇨🇼', 'Côte d\'Ivoire': '🇨🇮',
                'Cape Verde': '🇨', 'New Zealand': '🇳', 'Congo DR': '🇨🇩',
                'Uzbekistan': '🇺🇿', 'Haiti': '🇭🇹', 'Panama': '🇵🇦',
                'Nigeria': '🇳', 'Cameroon': '🇨🇲', 'Korea Republic': '🇰🇷',
                'Czechia': '🇨🇿'
              };

              const matches = response.matches.map(match => {
                const homeFlag = flags[match.homeTeam.shortName] || '⚽';
                const awayFlag = flags[match.awayTeam.shortName] || '⚽';
                
                let status = 'upcoming';
                let statusText = '⏱️ قادمة';
                
                if (match.status === 'FINISHED') {
                  status = 'finished';
                  statusText = '✅ انتهت';
                } else if (match.status === 'IN_PLAY' || match.status === 'PAUSED' || match.status === 'TIMED') {
                  status = 'live';
                  statusText = ' مباشر';
                }

                let score = '- : -';
                if (match.score.fullTime.home !== null) {
                  score = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
                }

                return {
                  group: match.competition.name,
                  date: match.utcDate.split('T')[0],
                  time: match.utcDate.split('T')[1].split('Z')[0].substring(0, 5),
                  team1: `${homeFlag} ${match.homeTeam.shortName}`,
                  team2: `${awayFlag} ${match.awayTeam.shortName}`,
                  homeTeam: match.homeTeam.shortName,
                  awayTeam: match.awayTeam.shortName,
                  score: score,
                  status: status,
                  statusText: statusText,
                  minute: match.minute || '',
                  utcDate: match.utcDate,
                  competition: match.competition.name,
                  matchday: match.matchday,
                  venue: match.venue || 'غير محدد',
                  referees: match.referees?.[0]?.name || ''
                };
              });

              // ترتيب حسب التاريخ
              matches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

              const output = {
                lastUpdate: new Date().toISOString(),
                liveMatchesCount: matches.filter(m => m.status === 'live').length,
                totalMatches: matches.length,
                matches: matches
              };

              fs.writeFileSync('matches.json', JSON.stringify(output, null, 2));
              console.log(`✅ Saved ${matches.length} matches to matches.json`);
              console.log(`🔴 Live matches: ${output.liveMatchesCount}`);
            });
          });

          req.on('error', (error) => {
            console.error('❌ Request error:', error);
            process.exit(1);
          });
          EOF

          node fetch-matches.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: تحديث المباريات - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: matches.json
