name: Update Football Matches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install node-fetch
        run: npm install node-fetch@2
      
      - name: Fetch Matches
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node fetch-matches.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update matches - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: matches.json
