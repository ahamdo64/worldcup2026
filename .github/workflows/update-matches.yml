name: Update Football Matches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Fetch and Process Matches
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          cat > fetch-matches.js << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.API_KEY;
          
          // التحقق من وجود المفتاح
          if (!API_KEY) {
            console.error('❌ خطأ: لم يتم العثور على مفتاح API');
            console.error('تأكد من إضافة FOOTBALL_API_KEY في GitHub Secrets');
            process.exit(1);
          }

          // فترة زمنية أقصر (15 يوم ماضية + 15 يوم قادمة)
          const dateFrom = new Date(Date.now() - 15 * 86400000).toISOString().split('T')[0];
          const dateTo = new Date(Date.now() + 15 * 86400000).toISOString().split('T')[0];

          console.log(`🔍 Fetching matches from ${dateFrom} to ${dateTo}`);
          console.log(`🔑 API Key: ${API_KEY ? 'موجود ✓' : 'غير موجود ✗'}`);

          const options = {
            hostname: 'api.football-data.org',
            path: `/v4/matches?dateFrom=${dateFrom}&dateTo=${dateTo}`,
            method: 'GET',
            headers: {
              'X-Auth-Token': API_KEY,
              'Accept': 'application/json'
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            
            console.log(`📊 HTTP Status: ${res.statusCode}`);
            
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              // معالجة الأخطاء المختلفة
              if (res.statusCode === 401) {
                console.error('❌ خطأ 401: مفتاح API غير صالح');
                console.error('تحقق من صحة المفتاح في GitHub Secrets');
                process.exit(1);
              }
              
              if (res.statusCode === 400) {
                console.error('❌ خطأ 400: طلب غير صحيح');
                console.error('الفترة الزمنية قد تكون غير صحيحة أو لا توجد مباريات');
                // إنشاء بيانات تجريبية
                createFallbackData();
                return;
              }
              
              if (res.statusCode !== 200) {
                console.error(`❌ API Error: ${res.statusCode}`);
                console.error('Response:', data.substring(0, 200));
                createFallbackData();
                return;
              }

              try {
                const response = JSON.parse(data);
                console.log(`✅ Received ${response.matches?.length || 0} matches`);

                if (!response.matches || response.matches.length === 0) {
                  console.log('⚠️ لا توجد مباريات في هذه الفترة');
                  createFallbackData();
                  return;
                }

                processMatches(response.matches);
                
              } catch (parseError) {
                console.error('❌ خطأ في تحليل JSON:', parseError.message);
                createFallbackData();
              }
            });
          });

          req.on('error', (error) => {
            console.error('❌ Request error:', error.message);
            createFallbackData();
          });

          req.end();

          // دالة معالجة المباريات
          function processMatches(matches) {
            const flags = {
              'Brazil': '🇧🇷', 'Argentina': '🇦🇷', 'Germany': '🇩🇪',
              'France': '🇫🇷', 'Spain': '🇪🇸', 'England': '🏴󠁧󠁥󠁮󠁿',
              'Italy': '🇮🇹', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
              'Belgium': '🇧🇪', 'Mexico': '🇲🇽', 'USA': '🇺🇸',
              'Canada': '🇨🇦', 'Japan': '🇯🇵', 'South Korea': '🇰🇷',
              'Saudi Arabia': '🇸🇦', 'Egypt': '🇪🇬', 'Morocco': '🇲🇦',
              'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Qatar': '🇶🇦',
              'Iraq': '🇮', 'Jordan': '🇴', 'Australia': '🇦🇺',
              'Uruguay': '🇺🇾', 'Colombia': '🇨🇴', 'Croatia': '🇭',
              'Ghana': '🇬🇭', 'Senegal': '🇸🇳', 'South Africa': '🇿🇦',
              'Sweden': '🇸🇪', 'Switzerland': '🇨', 'Austria': '🇹',
              'Denmark': '🇩🇰', 'Norway': '🇳🇴', 'Turkey': '🇹',
              'Iran': '🇮🇷', 'Paraguay': '🇵🇾', 'Ecuador': '🇪🇨',
              'Poland': '🇵🇱', 'Czech Republic': '🇨', 'Scotland': '󠁧󠁳󠁴',
              'Bosnia-H.': '🇧', 'Curaçao': '🇨🇼', 'Côte d\'Ivoire': '🇨🇮',
              'Cape Verde': '🇨🇻', 'New Zealand': '🇳🇿', 'Congo DR': '🇨🇩',
              'Uzbekistan': '🇺🇿', 'Haiti': '🇭🇹', 'Panama': '🇵🇦',
              'Nigeria': '🇳', 'Cameroon': '🇲', 'Korea Republic': '🇰🇷',
              'Czechia': '🇨'
            };

            const processedMatches = matches.map(match => {
              const homeFlag = flags[match.homeTeam.shortName] || '⚽';
              const awayFlag = flags[match.awayTeam.shortName] || '⚽';
              
              let status = 'upcoming';
              let statusText = '⏱️ قادمة';
              
              if (match.status === 'FINISHED') {
                status = 'finished';
                statusText = '✅ انتهت';
              } else if (match.status === 'IN_PLAY' || match.status === 'PAUSED' || match.status === 'TIMED') {
                status = 'live';
                statusText = '🔴 مباشر';
              } else if (match.status === 'SCHEDULED') {
                status = 'scheduled';
                statusText = '⏰ مجدولة';
              }

              let score = '- : -';
              if (match.score.fullTime.home !== null) {
                score = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
              }

              return {
                group: match.competition?.name || 'البطولة',
                date: match.utcDate.split('T')[0],
                time: match.utcDate.split('T')[1].split('Z')[0].substring(0, 5),
                team1: `${homeFlag} ${match.homeTeam.shortName}`,
                team2: `${awayFlag} ${match.awayTeam.shortName}`,
                homeTeam: match.homeTeam.shortName,
                awayTeam: match.awayTeam.shortName,
                score: score,
                status: status,
                statusText: statusText,
                minute: match.minute || '',
                utcDate: match.utcDate,
                competition: match.competition?.name || 'البطولة',
                matchday: match.matchday,
                venue: match.venue || 'غير محدد',
                referees: match.referees?.[0]?.name || ''
              };
            });

            // ترتيب حسب التاريخ
            processedMatches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

            // إحصائيات
            const finishedMatches = processedMatches.filter(m => m.status === 'finished');
            const liveMatches = processedMatches.filter(m => m.status === 'live');
            const upcomingMatches = processedMatches.filter(m => m.status === 'scheduled' || m.status === 'upcoming');

            const output = {
              lastUpdate: new Date().toISOString(),
              totalMatches: processedMatches.length,
              finishedMatchesCount: finishedMatches.length,
              liveMatchesCount: liveMatches.length,
              upcomingMatchesCount: upcomingMatches.length,
              matches: processedMatches
            };

            fs.writeFileSync('matches.json', JSON.stringify(output, null, 2));
            
            console.log(`✅ Saved ${processedMatches.length} matches to matches.json`);
            console.log(`✅ Finished: ${finishedMatches.length}`);
            console.log(`🔴 Live: ${liveMatches.length}`);
            console.log(`⏰ Upcoming: ${upcomingMatches.length}`);
          }

          // دالة إنشاء بيانات تجريبية عند الفشل
          function createFallbackData() {
            console.log('⚠️ إنشاء بيانات تجريبية...');
            
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            
            const fallbackData = {
              lastUpdate: new Date().toISOString(),
              totalMatches: 2,
              finishedMatchesCount: 1,
              liveMatchesCount: 0,
              upcomingMatchesCount: 1,
              matches: [
                {
                  group: "FIFA World Cup",
                  date: today,
                  time: "19:00",
                  team1: "🇲 Mexico",
                  team2: "🇿🇦 South Africa",
                  homeTeam: "Mexico",
                  awayTeam: "South Africa",
                  score: "2 - 0",
                  status: "finished",
                  statusText: "✅ انتهت",
                  minute: "",
                  utcDate: `${today}T19:00:00Z`,
                  competition: "FIFA World Cup",
                  matchday: 1,
                  venue: "غير محدد",
                  referees: ""
                },
                {
                  group: "FIFA World Cup",
                  date: tomorrow,
                  time: "22:00",
                  team1: "🇧🇷 Brazil",
                  team2: "🇲🇦 Morocco",
                  homeTeam: "Brazil",
                  awayTeam: "Morocco",
                  score: "- : -",
                  status: "scheduled",
                  statusText: "⏰ مجدولة",
                  minute: "",
                  utcDate: `${tomorrow}T22:00:00Z`,
                  competition: "FIFA World Cup",
                  matchday: 1,
                  venue: "غير محدد",
                  referees: ""
                }
              ]
            };
            
            fs.writeFileSync('matches.json', JSON.stringify(fallbackData, null, 2));
            console.log('✅ تم إنشاء بيانات تجريبية في matches.json');
          }
          EOF

          node fetch-matches.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: تحديث المباريات - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: matches.json
