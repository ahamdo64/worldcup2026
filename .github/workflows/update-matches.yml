name: تحديث نتائج المباريات تلقائياً

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-matches:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm init -y
          npm install node-fetch@2

      - name: Fetch and Update Matches
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          node << 'EOF'
          const fetch = require('node-fetch');
          const fs = require('fs');

          async function fetchMatches() {
            try {
              const today = new Date().toISOString().split('T')[0];
              const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
              
              console.log('📅 جاري جلب المباريات من', today, 'إلى', tomorrow);

              const response = await fetch(
                `https://api.football-data.org/v4/matches?dateFrom=${today}&dateTo=${tomorrow}`,
                {
                  headers: {
                    'X-Auth-Token': process.env.FOOTBALL_API_KEY
                  }
                }
              );

              if (!response.ok) {
                throw new Error(`API Error: ${response.status}`);
              }

              const data = await response.json();
              console.log(`✅ تم جلب ${data.matches.length} مباراة`);

              const teamFlags = {
                'Brazil': '🇧🇷', 'Argentina': '🇦🇷', 'Germany': '🇩🇪',
                'France': '🇫🇷', 'Spain': '🇪🇸', 'England': '🏴󠁧󠁮',
                'Italy': '🇮🇹', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
                'Belgium': '🇧', 'Mexico': '🇽', 'USA': '🇺🇸',
                'Canada': '🇨🇦', 'Japan': '🇯🇵', 'South Korea': '🇰🇷',
                'Saudi Arabia': '🇸🇦', 'Egypt': '🇪🇬', 'Morocco': '🇲🇦',
                'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Qatar': '🇶🇦',
                'Iraq': '🇮', 'Jordan': '🇴', 'Australia': '🇦🇺',
                'Uruguay': '🇺🇾', 'Colombia': '🇨🇴', 'Croatia': '🇭',
                'Ghana': '🇬🇭', 'Senegal': '🇸🇳', 'South Africa': '🇿🇦',
                'Sweden': '🇸🇪', 'Switzerland': '🇨🇭', 'Austria': '🇦🇹',
                'Denmark': '🇩🇰', 'Norway': '🇳🇴', 'Turkey': '🇹🇷',
                'Iran': '🇮', 'Paraguay': '🇾', 'Ecuador': '🇪'
              };

              const matches = data.matches.map(match => {
                let status = 'upcoming';
                if (match.status === 'FINISHED') status = 'finished';
                else if (match.status === 'IN_PLAY' || match.status === 'PAUSED') status = 'live';

                let score = '- : -';
                if (match.score.fullTime.home !== null) {
                  score = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
                }

                const homeFlag = teamFlags[match.homeTeam.shortName] || '⚽';
                const awayFlag = teamFlags[match.awayTeam.shortName] || '⚽';

                return {
                  group: match.competition.name,
                  date: match.utcDate.split('T')[0],
                  team1: `${homeFlag} ${match.homeTeam.shortName}`,
                  team2: `${awayFlag} ${match.awayTeam.shortName}`,
                  score: score,
                  status: status,
                  utcDate: match.utcDate
                };
              });

              matches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));
              fs.writeFileSync('matches.json', JSON.stringify(matches, null, 2));
              console.log('✅ تم الحفظ في matches.json');

            } catch (error) {
              console.error('❌ خطأ:', error.message);
              process.exit(1);
            }
          }

          fetchMatches();
          EOF

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: تحديث المباريات تلقائياً"
          file_pattern: matches.json
