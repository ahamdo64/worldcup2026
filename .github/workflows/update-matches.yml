name: تحديث نتائج المباريات تلقائياً

on:
  schedule:
    - cron: '0 */6 * * *'  # كل 6 ساعات
  workflow_dispatch:  # تشغيل يدوي

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install node-fetch@2

      - name: Fetch and Update Matches
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          node << 'EOF'
          const fetch = require('node-fetch');
          const fs = require('fs');

          async function fetchMatches() {
            const apiUrl = 'https://api.football-data.org/v4/matches';
            
            // رموز البطولات (يمكنك تعديلها حسب احتياجاتك)
            const competitions = [
              'WC',           // كأس العالم
              'EC',           // كأس أوروبا
              'PL',           // الدوري الإنجليزي
              'PD',           // الدوري الإسباني
              'BL1',          // الدوري الألماني
              'SA',           // الدوري الإيطالي
              'FL1',          // الدوري الفرنسي
              'CL'            // دوري أبطال أوروبا
            ];

            const allMatches = [];
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
            const dateFrom = today;
            const dateTo = tomorrow;

            console.log('جاري جلب المباريات من', dateFrom, 'إلى', dateTo);

            try {
              // جلب المباريات حسب التاريخ
              const response = await fetch(
                `${apiUrl}?dateFrom=${dateFrom}&dateTo=${dateTo}`,
                {
                  headers: {
                    'X-Auth-Token': process.env.FOOTBALL_API_KEY
                  }
                }
              );

              if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
              }

              const data = await response.json();
              console.log(`تم جلب ${data.matches.length} مباراة`);

              // معالجة البيانات
              data.matches.forEach(match => {
                const matchDate = match.utcDate.split('T')[0];
                
                // تحديد الحالة
                let status = 'upcoming';
                if (match.status === 'FINISHED') {
                  status = 'finished';
                } else if (match.status === 'IN_PLAY' || match.status === 'PAUSED') {
                  status = 'live';
                }

                // تنسيق النتيجة
                let score = '- : -';
                if (match.score.fullTime.home !== null) {
                  score = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
                }

                // إضافة الرموز (يمكنك تخصيصها)
                const teamFlags = {
                  'Brazil': '🇧🇷', 'Argentina': '🇦🇷', 'Germany': '🇩🇪',
                  'France': '🇫🇷', 'Spain': '🇪🇸', 'England': '🏴󠁧󠁢󠁥󠁮󠁧󠁿',
                  'Italy': '🇮🇹', 'Portugal': '🇵🇹', 'Netherlands': '🇳🇱',
                  'Belgium': '🇧🇪', 'Mexico': '🇲🇽', 'USA': '🇺🇸',
                  'Canada': '🇨🇦', 'Japan': '🇯🇵', 'South Korea': '🇰🇷',
                  'Saudi Arabia': '🇸🇦', 'Egypt': '🇪🇬', 'Morocco': '🇲🇦',
                  'Algeria': '🇩🇿', 'Tunisia': '🇹🇳', 'Qatar': '🇶🇦',
                  'Iraq': '🇮🇶', 'Jordan': '🇯🇴', 'Australia': '🇦🇺',
                  'Uruguay': '🇺🇾', 'Colombia': '🇨🇴', 'Croatia': '🇭🇷',
                  'Ghana': '🇬🇭', 'Senegal': '🇸🇳', 'Nigeria': '🇳🇬',
                  'Cameroon': '🇨🇲', 'South Africa': '🇿🇦', 'Poland': '🇵🇱',
                  'Sweden': '🇸🇪', 'Switzerland': '🇨🇭', 'Austria': '🇦🇹',
                  'Denmark': '🇩🇰', 'Norway': '🇳🇴', 'Scotland': '🏴󠁧󠁢󠁳󠁣󠁴󠁿',
                  'Czech Republic': '🇨🇿', 'Turkey': '🇹🇷', 'Iran': '🇮🇷',
                  'Paraguay': '🇵🇾', 'Ecuador': '🇪🇨', 'Panama': '🇵🇦',
                  'Haiti': '🇭🇹', 'Bosnia and Herzegovina': '🇧🇦',
                  'Curaçao': '🇨🇼', "Côte d'Ivoire": '🇨🇮',
                  'Cape Verde': '🇨🇻', 'New Zealand': '🇳🇿',
                  'Congo DR': '🇨🇩', 'Uzbekistan': '🇺🇿'
                };

                const homeFlag = teamFlags[match.homeTeam.shortName] || '⚽';
                const awayFlag = teamFlags[match.awayTeam.shortName] || '⚽';

                allMatches.push({
                  group: match.competition.name,
                  date: matchDate,
                  team1: `${homeFlag} ${match.homeTeam.shortName}`,
                  team2: `${awayFlag} ${match.awayTeam.shortName}`,
                  score: score,
                  status: status,
                  utcDate: match.utcDate
                });
              });

              // ترتيب المباريات حسب التاريخ
              allMatches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

              // حفظ في ملف JSON
              fs.writeFileSync('matches.json', JSON.stringify(allMatches, null, 2));
              console.log('✅ تم تحديث matches.json بنجاح مع', allMatches.length, 'مباراة');

            } catch (error) {
              console.error('❌ خطأ في جلب البيانات:', error.message);
              process.exit(1);
            }
          }

          fetchMatches();
          EOF

     - name: Commit and push changes
  uses: stefanzweifel/git-auto-commit-action@v5
  with:
    commit_message: "chore: تحديث المباريات تلقائياً"
    file_pattern: matches.json
    commit_options: '--no-verify'
