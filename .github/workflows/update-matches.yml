name: Update Matches

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install node-fetch@2

      - name: Fetch Matches
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: node fetch-matches.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update matches automatically"
          file_pattern: matches.json
