name: Update Football Matches

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Fetch and Process Matches
        env:
          API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: |
          cat > fetch-matches.js << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const API_KEY = process.env.API_KEY;
          
          // Ш¬Щ„ШЁ Щ…ШЁШ§Ш±ЩЉШ§ШЄ Щ…Щ† 30 ЩЉЩ€Щ… Щ…Ш§Ш¶ЩЉШ© ШҐЩ„Щ‰ 30 ЩЉЩ€Щ… Щ‚Ш§ШЇЩ…Ш©
          const dateFrom = new Date(Date.now() - 30 * 86400000).toISOString().split('T')[0];
          const dateTo = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];

          console.log(`рџ”Ќ Fetching matches from ${dateFrom} to ${dateTo}`);

          const options = {
            hostname: 'api.football-data.org',
            path: `/v4/matches?dateFrom=${dateFrom}&dateTo=${dateTo}`,
            headers: {
              'X-Auth-Token': API_KEY
            }
          };

          const req = https.get(options, (res) => {
            let data = '';
            
            res.on('data', (chunk) => data += chunk);
            res.on('end', () => {
              if (res.statusCode !== 200) {
                console.error(`вќЊ API Error: ${res.statusCode}`);
                process.exit(1);
              }

              const response = JSON.parse(data);
              console.log(`вњ… Received ${response.matches.length} matches`);

              const flags = {
                'Brazil': 'рџ‡§рџ‡·', 'Argentina': 'рџ‡¦рџ‡·', 'Germany': 'рџ‡©рџ‡Є',
                'France': 'рџ‡«рџ‡·', 'Spain': 'рџ‡Єрџ‡ё', 'England': 'рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї',
                'Italy': 'рџ‡®рџ‡№', 'Portugal': 'рџ‡µрџ‡№', 'Netherlands': 'рџ‡ірџ‡±',
                'Belgium': 'рџ‡§рџ‡Є', 'Mexico': 'рџ‡Ірџ‡Ѕ', 'USA': 'рџ‡єрџ‡ё',
                'Canada': 'рџ‡Ёрџ‡¦', 'Japan': 'рџ‡Їрџ‡µ', 'South Korea': 'рџ‡°рџ‡·',
                'Saudi Arabia': 'рџ‡ёрџ‡¦', 'Egypt': 'рџ‡Єрџ‡¬', 'Morocco': 'рџ‡Ірџ‡¦',
                'Algeria': 'рџ‡©рџ‡ї', 'Tunisia': 'рџ‡№рџ‡і', 'Qatar': 'рџ‡¶рџ‡¦',
                'Iraq': 'рџ‡®рџ‡¶', 'Jordan': 'рџ‡Їрџ‡ґ', 'Australia': 'рџ‡¦рџ‡є',
                'Uruguay': 'рџ‡єрџ‡ѕ', 'Colombia': 'рџ‡Ёрџ‡ґ', 'Croatia': 'рџ‡­рџ‡·',
                'Ghana': 'рџ‡¬рџ‡­', 'Senegal': 'рџ‡ёрџ‡і', 'South Africa': 'рџ‡їрџ‡¦',
                'Sweden': 'рџ‡ёрџ‡Є', 'Switzerland': 'рџ‡Ёрџ‡­', 'Austria': 'рџ‡¦рџ‡№',
                'Denmark': 'рџ‡©рџ‡°', 'Norway': 'рџ‡ірџ‡ґ', 'Turkey': 'рџ‡№рџ‡·',
                'Iran': 'рџ‡®рџ‡·', 'Paraguay': 'рџ‡µрџ‡ѕ', 'Ecuador': 'рџ‡Єрџ‡Ё',
                'Poland': 'рџ‡µрџ‡±', 'Czech Republic': 'рџ‡Ёрџ‡ї', 'Scotland': 'рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї',
                'Bosnia-H.': 'рџ‡§рџ‡¦', 'CuraГ§ao': 'рџ‡Ёрџ‡ј', 'CГґte d\'Ivoire': 'рџ‡Ёрџ‡®',
                'Cape Verde': 'рџ‡Ёрџ‡»', 'New Zealand': 'рџ‡ірџ‡ї', 'Congo DR': 'рџ‡Ёрџ‡©',
                'Uzbekistan': 'рџ‡єрџ‡ї', 'Haiti': 'рџ‡­рџ‡№', 'Panama': 'рџ‡µрџ‡¦',
                'Nigeria': 'рџ‡ірџ‡¬', 'Cameroon': 'рџ‡Ёрџ‡І', 'Korea Republic': 'рџ‡°рџ‡·',
                'Czechia': 'рџ‡Ёрџ‡ї'
              };

              const matches = response.matches.map(match => {
                const homeFlag = flags[match.homeTeam.shortName] || 'вљЅ';
                const awayFlag = flags[match.awayTeam.shortName] || 'вљЅ';
                
                let status = 'upcoming';
                let statusText = 'вЏ±пёЏ Щ‚Ш§ШЇЩ…Ш©';
                
                if (match.status === 'FINISHED') {
                  status = 'finished';
                  statusText = 'вњ… Ш§Щ†ШЄЩ‡ШЄ';
                } else if (match.status === 'IN_PLAY' || match.status === 'PAUSED' || match.status === 'TIMED') {
                  status = 'live';
                  statusText = 'рџ”ґ Щ…ШЁШ§ШґШ±';
                } else if (match.status === 'SCHEDULED' || match.status === 'TIMED') {
                  status = 'scheduled';
                  statusText = 'вЏ° Щ…Ш¬ШЇЩ€Щ„Ш©';
                }

                let score = '- : -';
                if (match.score.fullTime.home !== null) {
                  score = `${match.score.fullTime.home} - ${match.score.fullTime.away}`;
                }

                return {
                  group: match.competition.name,
                  date: match.utcDate.split('T')[0],
                  time: match.utcDate.split('T')[1].split('Z')[0].substring(0, 5),
                  team1: `${homeFlag} ${match.homeTeam.shortName}`,
                  team2: `${awayFlag} ${match.awayTeam.shortName}`,
                  homeTeam: match.homeTeam.shortName,
                  awayTeam: match.awayTeam.shortName,
                  score: score,
                  status: status,
                  statusText: statusText,
                  minute: match.minute || '',
                  utcDate: match.utcDate,
                  competition: match.competition.name,
                  matchday: match.matchday,
                  venue: match.venue || 'ШєЩЉШ± Щ…Ш­ШЇШЇ',
                  referees: match.referees?.[0]?.name || ''
                };
              });

              // ШЄШ±ШЄЩЉШЁ Ш­ШіШЁ Ш§Щ„ШЄШ§Ш±ЩЉШ®
              matches.sort((a, b) => new Date(a.utcDate) - new Date(b.utcDate));

              // ШҐШ­ШµШ§Ш¦ЩЉШ§ШЄ
              const finishedMatches = matches.filter(m => m.status === 'finished');
              const liveMatches = matches.filter(m => m.status === 'live');
              const upcomingMatches = matches.filter(m => m.status === 'scheduled' || m.status === 'upcoming');

              const output = {
                lastUpdate: new Date().toISOString(),
                totalMatches: matches.length,
                finishedMatchesCount: finishedMatches.length,
                liveMatchesCount: liveMatches.length,
                upcomingMatchesCount: upcomingMatches.length,
                matches: matches
              };

              fs.writeFileSync('matches.json', JSON.stringify(output, null, 2));
              
              console.log(`вњ… Saved ${matches.length} matches to matches.json`);
              console.log(`вњ… Finished: ${finishedMatches.length}`);
              console.log(`рџ”ґ Live: ${liveMatches.length}`);
              console.log(`вЏ° Upcoming: ${upcomingMatches.length}`);
            });
          });

          req.on('error', (error) => {
            console.error('вќЊ Request error:', error);
            process.exit(1);
          });
          EOF

          node fetch-matches.js

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: ШЄШ­ШЇЩЉШ« Ш§Щ„Щ…ШЁШ§Ш±ЩЉШ§ШЄ - $(date +'%Y-%m-%d %H:%M')"
          file_pattern: matches.json
